name: Verify Trivia Rush

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - phase-5-foundation
      - feature/social-tabs-redesign

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply social redesign integration
        run: node scripts/apply-social-tabs-redesign.mjs

      - name: Install test dependencies
        run: npm ci

      - name: Verify question bank
        run: npm run test:questions

      - name: Verify authoritative database flow
        run: npm run test:database

      - name: Verify global progression foundation
        run: npm run test:global-progression

      - name: Verify solo global progression
        run: npm run test:global-progression-solo

      - name: Verify live duel global progression
        run: npm run test:global-progression-live-duels

      - name: Verify turn-based global progression
        run: npm run test:global-progression-turn-based

      - name: Verify historical progression backfill
        run: npm run test:global-progression-backfill

      - name: Verify frontend
        run: npm run test:frontend

      - name: Commit generated integration changes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html package.json social-redesign.js
          git commit -m "Wire the social tabs redesign"
          git push
