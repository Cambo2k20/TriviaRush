name: Verify Trivia Rush

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - phase-5-foundation

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Verify questions, database flow and frontend
        run: npm test
