name: Verify Trivia Rush

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - phase-5-foundation

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply application assets to the current production page
        run: node scripts/sync-social-branch-with-main.mjs

      - name: Install test dependencies
        run: npm ci

      - name: Verify question bank
        run: npm run test:questions

      - name: Verify authoritative database flow
        run: npm run test:database

      - name: Verify global progression foundation
        run: npm run test:global-progression

      - name: Verify solo global progression
        run: npm run test:global-progression-solo

      - name: Verify live duel global progression
        run: npm run test:global-progression-live-duels

      - name: Verify turn-based global progression
        run: npm run test:global-progression-turn-based

      - name: Verify historical progression backfill
        run: npm run test:global-progression-backfill

      - name: Verify frontend
        run: npm run test:frontend

      - name: Capture social redesign screenshots
        run: node scripts/capture-social-redesign.mjs

      - name: Upload social redesign screenshots
        uses: actions/upload-artifact@v4
        with:
          name: social-redesign-screenshots
          path: artifacts/social-redesign/*.png
          if-no-files-found: error

      - name: Capture mobile mode menu screenshots
        run: node scripts/capture-mobile-mode-menu.mjs

      - name: Upload mobile mode menu screenshots
        uses: actions/upload-artifact@v4
        with:
          name: mobile-mode-menu-screenshots
          path: artifacts/mobile-mode-menu/*.png
          if-no-files-found: error

      - name: Commit generated production page
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- index.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Wire the current UI assets into the production page"
          git push
