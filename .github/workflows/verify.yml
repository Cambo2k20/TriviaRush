name: Verify Trivia Rush

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - phase-5-foundation

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Verify question bank
        run: npm run test:questions

      - name: Verify authoritative database flow
        run: npm run test:database

      - name: Verify global progression foundation
        run: |
          set -o pipefail
          npm run test:global-progression 2>&1 | tee global-progression-test.log

      - name: Upload progression test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: global-progression-test-log
          path: global-progression-test.log
          if-no-files-found: ignore

      - name: Verify frontend
        run: npm run test:frontend
