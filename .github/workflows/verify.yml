name: Verify Trivia Rush

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - phase-5-foundation
      - fix/responsive-home-alignment

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate responsive home layout
        if: github.event_name == 'push' && github.ref == 'refs/heads/fix/responsive-home-alignment'
        run: node scripts/apply-responsive-home-layout.mjs

      - name: Commit regenerated home layout
        if: github.event_name == 'push' && github.ref == 'refs/heads/fix/responsive-home-alignment'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home-redesign.css index.html home-redesign-smoke-test.mjs
          if git diff --cached --quiet; then
            echo "Responsive home layout already generated."
          else
            git commit -m "Regenerate responsive home alignment"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Verify question bank
        run: npm run test:questions

      - name: Verify authoritative database flow
        run: npm run test:database

      - name: Verify global progression foundation
        run: npm run test:global-progression

      - name: Verify solo global progression
        run: npm run test:global-progression-solo

      - name: Verify live duel global progression
        run: npm run test:global-progression-live-duels

      - name: Verify turn-based global progression
        run: npm run test:global-progression-turn-based

      - name: Verify historical progression backfill
        run: npm run test:global-progression-backfill

      - name: Verify frontend
        run: npm run test:frontend
